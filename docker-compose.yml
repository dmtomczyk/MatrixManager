services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MATRIX_ENV: production
      MATRIX_UI_USE_DEV_SERVER: "false"
      API_HOST: 0.0.0.0
      API_PORT: 8000
      MATRIX_TS_DATA_DB_PATH: /data/sqlite/matrixmanager-ts-data.sqlite
      MATRIX_TS_CONTROL_DB_PATH: /data/app/matrixmanager-ts-control.sqlite
      MATRIX_ACTIVE_DB_TYPE: ${MATRIX_ACTIVE_DB_TYPE:-sqlite}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "${MATRIX_APP_PORT:-8000}:8000"
    volumes:
      - ./data/sqlite:/data/sqlite
      - ./data/app:/data/app
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    profiles:
      - postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-matrixmanager}
      POSTGRES_USER: ${POSTGRES_USER:-matrixmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matrixmanager-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-matrixmanager} -d ${POSTGRES_DB:-matrixmanager}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
